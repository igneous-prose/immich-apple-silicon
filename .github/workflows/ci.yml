name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile immich_accelerator/__init__.py
      - name: Run pytest (if tests exist)
        run: |
          pip install pytest
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest -v
          else
            echo "No test files found - skipping"
          fi

  auto-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for version bump and tag
        id: tag
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version ${VERSION} — creating tag"
            git tag "v${VERSION}"
            git push origin "v${VERSION}"
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger Homebrew formula update
        if: steps.tag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          gh workflow run update-homebrew.yml -f tag="$TAG_NAME"
