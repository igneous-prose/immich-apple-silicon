<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Immich Accelerator</title>
<style>
  :root {
    --bg: #09090b;
    --card: #18181b;
    --card-border: #27272a;
    --card-hover: #1f1f23;
    --text: #fafafa;
    --text-dim: #71717a;
    --text-muted: #52525b;
    --accent: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --amber: #f59e0b;
    --teal: #14b8a6;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 880px; margin: 0 auto; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.025em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }

  .header-right a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .version-badge {
    background: var(--card);
    border: 1px solid var(--card-border);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  /* Services */
  .services {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .service {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
  }

  .service:hover { background: var(--card-hover); }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot.on { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,0.5); }
  .dot.off { background: var(--red); box-shadow: 0 0 6px rgba(239,68,68,0.4); }

  .service-label { font-size: 13px; font-weight: 500; }

  /* Section headers */
  .section {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    font-weight: 600;
    margin: 20px 0 10px;
  }

  /* Chip cards — 2x2 grid, each card represents a silicon unit */
  .chip-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .chip-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 16px;
    transition: background 0.15s;
  }

  .chip-card:hover { background: var(--card-hover); }

  .chip-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .chip-header.cpu { color: var(--amber); }
  .chip-header.gpu { color: var(--purple); }
  .chip-header.ane { color: var(--teal); }
  .chip-header.vtb { color: var(--blue); }

  .task-row {
    margin-bottom: 8px;
  }

  .task-row:last-child { margin-bottom: 0; }

  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
  }

  .task-label { font-size: 13px; font-weight: 500; color: var(--text-dim); }

  .task-pct {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, var(--text), var(--text-dim));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Smaller pct for multi-task cards so they don't dominate */
  .task-pct.sub {
    font-size: 20px;
  }

  .bar-bg {
    height: 4px;
    background: var(--card-border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .bar-fill.cpu { background: linear-gradient(90deg, var(--amber), #fcd34d); }
  .bar-fill.gpu { background: linear-gradient(90deg, var(--purple), #c084fc); }
  .bar-fill.ane { background: linear-gradient(90deg, var(--teal), #5eead4); }
  .bar-fill.vtb { background: linear-gradient(90deg, var(--blue), #60a5fa); }

  .task-stats {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .task-rate { color: var(--text-dim); font-weight: 500; }

  /* Divider between tasks in multi-task cards */
  .task-divider {
    border: none;
    border-top: 1px solid var(--card-border);
    margin: 10px 0;
  }

  /* System bar */
  .sys {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 20px;
    font-variant-numeric: tabular-nums;
  }

  .sys .v { color: var(--text-dim); font-weight: 500; }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 24px;
  }

  footer a { color: var(--text-muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  @media (max-width: 640px) {
    .chip-grid { grid-template-columns: 1fr; }
    .services { flex-direction: column; }
    .task-pct { font-size: 22px; }
    .task-pct.sub { font-size: 18px; }
    body { padding: 16px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>Immich Accelerator</h1>
    </div>
    <div class="header-right">
      <span class="version-badge">Accelerator <span id="acc-ver">—</span></span>
      <span class="version-badge">Immich <span id="ver">—</span></span>
      <a id="immich-link" href="#" target="_blank">Open Immich →</a>
    </div>
  </header>

  <div class="services" id="svc"></div>

  <div class="section" style="display:flex; justify-content:space-between; align-items:center;">
    <span>Apple Silicon</span>
    <button id="requeue-btn" style="
      background: var(--card); border: 1px solid var(--card-border);
      color: var(--text-dim); font-size: 11px; padding: 4px 12px;
      border-radius: 6px; cursor: pointer; font-weight: 500;
      transition: all 0.15s;
    " onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--text)'"
       onmouseout="this.style.borderColor='var(--card-border)'; this.style.color='var(--text-dim)'"
    >Re-queue Missing ↻</button>
  </div>
  <div class="chip-grid" id="chips"></div>

  <div class="sys" id="sys"></div>

  <footer>
    <a href="https://github.com/epheterson/immich-apple-silicon">immich-accelerator</a> <span id="footer-ver">v1.0.0</span>
    · Built with ❤️ by <a href="https://github.com/epheterson">@epheterson</a>
  </footer>
</div>

<script>
// Chip cards — each chip has one or more tasks
const CHIPS = [
  { chip: 'cpu', chipLabel: 'CPU (NEON)', tasks: [
    { key: 'thumbnails', rk: 'thumbs', label: 'Thumbnails' },
  ]},
  { chip: 'gpu', chipLabel: 'Metal GPU', tasks: [
    { key: 'clip', rk: 'clip', label: 'CLIP Embeddings' },
  ]},
  { chip: 'ane', chipLabel: 'Neural Engine', tasks: [
    { key: 'faces', rk: 'faces', label: 'Face Detection' },
    { key: 'ocr', rk: 'ocr', label: 'OCR' },
  ]},
  { chip: 'vtb', chipLabel: 'VideoToolbox', tasks: [
    { key: 'video', rk: 'video', label: 'Video Transcode' },
  ]},
];

let prevSnapshot = null;
let prevTime = null;
const rates = { thumbs: 0, clip: 0, faces: 0, ocr: 0, video: 0 };

function calcRates(progress) {
  const now = Date.now();
  const snap = {
    thumbs: progress.thumbnails.done,
    clip: progress.clip.done,
    faces: progress.faces.done,
    ocr: progress.ocr.done,
    video: progress.video.done,
  };

  if (prevSnapshot && prevTime) {
    const dt = (now - prevTime) / 60000;
    if (dt > 0.05) {
      for (const k of Object.keys(rates)) {
        const delta = snap[k] - prevSnapshot[k];
        const raw = delta / dt;
        rates[k] = rates[k] ? Math.round(rates[k] * 0.7 + raw * 0.3) : Math.round(raw);
      }
    }
  }

  prevSnapshot = snap;
  prevTime = now;
}

function n(v) { return v.toLocaleString(); }

function etaStr(remaining, rate) {
  if (!rate || rate <= 0) return '';
  const m = remaining / rate;
  if (m < 60) return Math.round(m) + 'm left';
  const h = m / 60;
  if (h < 24) return h.toFixed(1) + 'h left';
  return (h / 24).toFixed(1) + 'd left';
}

function render(d) {
  calcRates(d.progress);

  // Versions
  document.getElementById('ver').textContent = 'v' + d.version;
  const accVer = 'v' + (d.accelerator_version || '?');
  document.getElementById('acc-ver').textContent = accVer;
  document.getElementById('footer-ver').textContent = accVer;

  // Immich link
  const link = document.getElementById('immich-link');
  link.href = window.location.protocol + '//' + window.location.hostname + ':2283';

  // Services
  const svcEl = document.getElementById('svc');
  svcEl.textContent = '';
  for (const [, svc] of Object.entries(d.services)) {
    const div = document.createElement('div');
    div.className = 'service';
    const dot = document.createElement('div');
    dot.className = 'dot ' + (svc.alive ? 'on' : 'off');
    const lbl = document.createElement('div');
    lbl.className = 'service-label';
    let label = svc.name;
    if (svc.rss_mb > 0) label += ' (' + svc.rss_mb + ' MB)';
    lbl.textContent = label;
    div.appendChild(dot);
    div.appendChild(lbl);
    svcEl.appendChild(div);
  }

  // Chip cards
  const chipsEl = document.getElementById('chips');
  chipsEl.textContent = '';

  for (const chip of CHIPS) {
    const card = document.createElement('div');
    card.className = 'chip-card';

    // Chip header
    const header = document.createElement('div');
    header.className = 'chip-header ' + chip.chip;
    header.textContent = chip.chipLabel;
    card.appendChild(header);

    const isMulti = chip.tasks.length > 1;

    chip.tasks.forEach((t, idx) => {
      const p = d.progress[t.key];
      const rate = rates[t.rk] || 0;
      const qc = (d.queue_counts && d.queue_counts[t.key]) || 0;
      const rem = qc > 0 ? qc : (p.total - p.done);
      const eta = etaStr(rem, rate);
      const qActive = d.queue_active && d.queue_active[t.key];
      const noApi = !d.queue_active || Object.keys(d.queue_active).length === 0;
      let rateText;
      if (rate > 0) {
        rateText = rate + '/min' + (eta ? ' \u00b7 ' + eta : '') + (qc > 0 ? ' \u00b7 ' + qc + ' queued' : '');
      } else if (p.pct >= 99.9) {
        rateText = 'done';
      } else if (qActive) {
        rateText = 'processing' + (qc > 0 ? ' \u00b7 ' + qc + ' queued' : '');
      } else if (noApi && p.done < p.total) {
        rateText = d.jobs_api_error ? 'no job data: ' + d.jobs_api_error : 'no job data (check api_key in config)';
      } else {
        rateText = 'idle';
      }

      // Divider between tasks
      if (idx > 0) {
        const hr = document.createElement('hr');
        hr.className = 'task-divider';
        card.appendChild(hr);
      }

      const row = document.createElement('div');
      row.className = 'task-row';

      // Top: label + pct
      const top = document.createElement('div');
      top.className = 'task-top';
      const label = document.createElement('div');
      label.className = 'task-label';
      label.textContent = t.label;
      const pct = document.createElement('div');
      pct.className = 'task-pct' + (isMulti ? ' sub' : '');
      pct.textContent = p.pct + '%';
      top.appendChild(label);
      top.appendChild(pct);
      row.appendChild(top);

      // Bar
      const barBg = document.createElement('div');
      barBg.className = 'bar-bg';
      const barFill = document.createElement('div');
      barFill.className = 'bar-fill ' + chip.chip;
      barFill.style.width = p.pct + '%';
      barBg.appendChild(barFill);
      row.appendChild(barBg);

      // Stats
      const stats = document.createElement('div');
      stats.className = 'task-stats';
      const countSpan = document.createElement('span');
      if (t.key === 'video') {
        countSpan.textContent = n(p.done) + ' transcoded';
      } else if (p.skipped > 0) {
        countSpan.textContent = n(p.done) + ' / ' + n(p.total) + ' · ' + n(p.skipped) + ' skipped';
      } else {
        countSpan.textContent = n(p.done) + ' / ' + n(p.total);
      }
      const rateSpan = document.createElement('span');
      rateSpan.className = 'task-rate';
      rateSpan.textContent = rateText;
      stats.appendChild(countSpan);
      stats.appendChild(rateSpan);
      row.appendChild(stats);

      card.appendChild(row);
    });

    chipsEl.appendChild(card);
  }

  // System
  const sysEl = document.getElementById('sys');
  sysEl.textContent = '';
  const items = [
    ['Load', d.system.load_1m.toFixed(1)],
    ['CPUs', String(d.system.cpus)],
    ['Memory', d.system.mem_total_gb + ' GB'],
    ['Updated', new Date().toLocaleTimeString()],
  ];
  for (const [label, val] of items) {
    const span = document.createElement('span');
    span.textContent = label + ' ';
    const v = document.createElement('span');
    v.className = 'v';
    v.textContent = val;
    span.appendChild(v);
    sysEl.appendChild(span);
  }
}

async function refresh() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    render(d);
  } catch(e) {
    console.error('Refresh:', e);
  }
}

// Re-queue button
document.getElementById('requeue-btn').addEventListener('click', async function() {
  const btn = this;
  btn.textContent = 'Queuing...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/requeue', { method: 'POST' });
    const d = await r.json();
    btn.textContent = 'Queued ✓';
    setTimeout(() => { btn.textContent = 'Re-queue Missing ↻'; btn.disabled = false; }, 3000);
  } catch(e) {
    btn.textContent = 'Failed';
    setTimeout(() => { btn.textContent = 'Re-queue Missing ↻'; btn.disabled = false; }, 3000);
  }
});

refresh();
setInterval(refresh, 5000);
</script>
</body>
</html>
